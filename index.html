
<!DOCTYPE html>
<html lang="gu">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalpesh Pravin Maheta | Anaj Business</title>

<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Mukta',sans-serif;
}

/* Mobile black animated background */

body{
background:#0b0b0b;
color:white;
padding:15px;
overflow-x:hidden;
}

/* glowing animation */

body::before{
content:'';
position:fixed;
width:300px;
height:300px;
background:#f39c12;
filter:blur(150px);
top:-80px;
left:-80px;
opacity:0.6;
animation:move 8s infinite alternate;
}

body::after{
content:'';
position:fixed;
width:300px;
height:300px;
background:#ff6b00;
filter:blur(150px);
bottom:-80px;
right:-80px;
opacity:0.6;
animation:move 8s infinite alternate;
}

@keyframes move{
0%{transform:translate(0,0)}
100%{transform:translate(120px,100px)}
}

/* language buttons */

.lang-bar{
display:flex;
justify-content:flex-end;
margin-bottom:10px;
}

.lang-btn{
border:none;
background:#222;
color:white;
padding:6px 12px;
border-radius:20px;
margin-left:6px;
font-weight:700;
}

.lang-btn.active{
background:#f39c12;
}

/* main card */

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* profile */

.profile{
text-align:center;
margin-bottom:15px;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #f39c12;
}

/* title */

h1{
font-size:20px;
margin-top:10px;
}

.subtitle{
color:#f39c12;
font-weight:700;
margin-top:5px;
}

/* features */

.features{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin:15px 0;
}

.feature{
background:#161616;
padding:10px;
border-radius:10px;
text-align:center;
font-size:14px;
}

/* images */

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin:15px 0;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* description */

.desc{
font-size:14px;
line-height:1.6;
color:#ddd;
margin-top:10px;
}

/* call button */

.call{
display:block;
text-align:center;
background:linear-gradient(135deg,#f39c12,#ff6b00);
padding:14px;
border-radius:12px;
margin-top:18px;
text-decoration:none;
color:white;
font-weight:700;
font-size:16px;
}

/* footer */

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<div class="lang-bar">

<button id="btn-hi" class="lang-btn" onclick="setLang('hi')">हिन्दी</button>
</div>

<div class="card">
