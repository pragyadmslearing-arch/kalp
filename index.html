
<!DOCTYPE html>
<html lang="gu">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalpesh Pravin Maheta | Anaj Business</title>

<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Mukta',sans-serif;
}

/* Modern animated background */

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#fdf6ec,#ffe0b2,#ffd180,#f39c12);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Language buttons */

.lang-bar{
position:fixed;
top:20px;
right:20px;
background:rgba(255,255,255,0.8);
padding:5px;
border-radius:30px;
display:flex;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.lang-btn{
border:none;
background:none;
padding:8px 15px;
cursor:pointer;
font-weight:700;
border-radius:20px;
}

.lang-btn.active{
background:#c67d1d;
color:white;
}

/* Card */

.card{
width:92%;
max-width:500px;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:30px 20px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

/* Profile */

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:5px solid white;
margin-top:-80px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
margin:15px 0 5px;
font-size:1.8rem;
}

.subtitle{
color:#c67d1d;
font-weight:700;
margin-bottom:20px;
}

/* Features */

.feature-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin:20px 0;
}

.feature-item{
background:#fff7ec;
padding:12px;
border-radius:12px;
}

/* Images */

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin:20px 0;
}

.gallery img{
width:100%;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Call button */

.call-btn{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
background:linear-gradient(135deg,#c67d1d,#f39c12);
color:white;
padding:15px;
border-radius:16px;
text-decoration:none;
font-weight:700;
margin-top:10px;
}

.footer{
margin-top:25px;
font-size:0.85rem;
color:#777;
}

</style>
</head>

<body>

<div class="lang-bar">
<button id="btn-gu" class="lang-btn active" onclick="updateLang('gu')">ગુજરાતી</button>
<button id="btn-hi" class="lang-btn" onclick="updateLang('hi')">हिन्दी</button>
</div>

<main class="card">

<img src="https://ui-avatars.com/api/?name=Kalpesh+Maheta&background=c67d1d&color=fff&size=128" class="profile-img">

<h1 id="name">કલ્પેશ પ્રવીણ મહેતા</h1>

<div class="subtitle" id="biz">અનાજ ખરીદી વ્યવસાય</div>

<div class="feature-grid">

<div class="feature-item">💰 <span id="f3">રોકડ ચુકવણી</span></div>
<div class="feature-item">🤝 <span id="f4">પાકો વિશ્વાસ</span></div>

<!-- IMAGE GALLERY -->

<div class="gallery">

<img src="photo/photo%20(1).jpeg" alt="Anaj Image 1">

અમે ખેડૂતો પાસેથી ઘઉં, બાજરી અને તમામ પ્રકારના અનાજની સીધી ખરીદી કરીએ છીએ.

<a href="tel:9825565053" class="call-btn">

<div class="footer">

9825565053 | Kalpesh Pravin Maheta

</div>

<script>

const t={
gu:{

f1:"શ્રેષ્ઠ ભાવ",
f2:"ચોક્કસ વજન",
f3:"રોકડ ચુકવણી",
f4:"પાકો વિશ્વાસ",
desc:"અમે ખેડૂતો પાસેથી ઘઉં, બાજરી અને તમામ પ્રકારના અનાજની સીધી ખરીદી કરીએ છીએ. પ્રામાણિકતા અને પારદર્શિતા એ જ અમારી ઓળખ છે.",

hi:{
name:"कल्पेश प्रवीण महेता",

btn:"अभी कॉल करें"
}
}

function updateLang(lang){

document.getElementById("name").innerText=t[lang].name
document.getElementById("biz").innerText=t[lang].biz
document.getElementById("f1").innerText=t[lang].f1
document.getElementById("f2").innerText=t[lang].f2
document.getElementById("f3").innerText=t[lang].f3
document.getElementById("f4").innerText=t[lang].f4
document.getElementById("desc").innerText=t[lang].desc
document.getElementById("btn").innerText=t[lang].btn

document.getElementById("btn-gu").classList.toggle("active",lang==="gu")
document.getElementById("btn-hi").classList.toggle("active",lang==="hi")

}

</script>
